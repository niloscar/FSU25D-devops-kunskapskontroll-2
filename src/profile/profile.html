<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <header></header>

    <main>
        <div id="main-title">
            <h1>My Profile Page</h1>
        </div>

        <form id="user-form">
            <div id="my-details">
            <h3>My details</h3>
            <label>Username: <input type="text" id="username"></label><br>
            <label>Email: <input type="email" id="mail"></label><br>
            <label>First name: <input type="text" id="fname"></label><br>
            <label>Last name: <input type="text" id="lname"></label><br>
            <label>Birthdate: <input type="date" id="birthdate"></label><br>
            </div>
            <div id="my-measurements">
            <h3>My Measurements</h3>
            <label>Latest Measured: <input type="date" id="measured_at"></label><br>
            <label>Height (cm): <input type="number" id="height_cm" step="0.1"></label><br>
            <label>Weight (kg): <input type="number" id="weight_kg" step="0.1"></label><br>
            </div>
        </form>
    </main>
    <script type="module">
        import { initProfilePage } from './profile-controller.js';
        initProfilePage();
    </script>

    <footer></footer>
</body>
</html>
